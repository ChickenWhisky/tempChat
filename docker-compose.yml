services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    # Not required maybe its already defined in the backend
    # environment:
    #   - CORS_ORIGINS=["http://localhost:5173","http://localhost"]
    networks:
      - chatbot-network

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - chatbot-network

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ~/.ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - chatbot-network

  temporal:
    image: temporalio/admin-tools:latest
    # This is a placeholder for the full temporal stack
    # In Phase 3 we will expand this to the full docker-compose.yml provided by Temporal
    container_name: temporal-admin
    networks:
      - chatbot-network

networks:
  chatbot-network:
    driver: bridge
